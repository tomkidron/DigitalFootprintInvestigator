repos:
  # Block accidental secret commits
  - repo: https://github.com/Yelp/detect-secrets
    rev: 68e8b45440415753fff70a312ece8da92ba85b4a  # frozen: v1.5.0
    hooks:
      - id: detect-secrets
        args: ['--baseline', '.secrets.baseline']
        exclude: venv/|\.git/|reports/|\.pytest_cache/

  # Lint and format Python
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: e05c5c0818279e5ac248ac9e954431ba58865e61  # frozen: v0.15.7
    hooks:
      - id: ruff
        args: ['--fix']
      - id: ruff-format

  # Catch common issues before they land
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: 3e8a8703264a2f4a69428a0aa4dcb512790b2c8c  # frozen: v6.0.0
    hooks:
      - id: check-merge-conflict   # no unresolved merge markers
      - id: check-added-large-files # warn on files > 500 KB
        args: ['--maxkb=500']
      - id: end-of-file-fixer      # ensure files end with a newline
      - id: trailing-whitespace    # strip trailing whitespace
      - id: check-case-conflict    # prevent case-sensitive filename conflicts
      - id: check-yaml             # validate YAML files
      - id: check-json             # validate JSON files
        exclude: \.vscode/
      - id: check-toml             # validate TOML files
      - id: debug-statements       # block print()/pdb/breakpoint() commits

  # Security scanning for Python source
  - repo: https://github.com/PyCQA/bandit
    rev: 92ae8b82fb422a639f0ed8d99e96cea769594e08  # frozen: 1.9.4
    hooks:
      - id: bandit
        args: ['-c', 'pyproject.toml']
        exclude: tests/

  # Block cache and generated files
  - repo: local
    hooks:
      - id: block-cache-files
        name: Block cache and generated files
        entry: 'bash -c "if git diff --cached --name-only | grep -E \"(\\.cache/|\\.ruff_cache/|__pycache__|/logs/.*\\.log$|/reports/.*\\.md$)\"; then echo \"ERROR: Attempting to commit cache/generated files. Add to .gitignore.\"; exit 1; fi"'
        language: system
        pass_filenames: false
        always_run: true
      - id: install-git-hooks
        name: Install local git hooks (post-commit)
        entry: python scripts/install_hooks.py
        language: python
        pass_filenames: false
        always_run: true
