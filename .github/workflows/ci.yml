name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read
  actions: write  # required for docker buildx GHA cache (cache-to: type=gha)

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      docker:
        image: docker:24.0.5-dind
        options: --privileged

    steps:
    - uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Build Docker image with caching
      uses: docker/build-push-action@v5
      with:
        context: .
        load: true
        tags: osint-tool:latest
        cache-from: type=gha
        cache-to: type=gha,mode=max

    - name: Run Unit Tests
      run: docker compose run --rm unit-tests pytest tests/unit/ -m "not local_only" -v --tb=short

    - name: Run UI Tests (Streamlit + Playwright)
      run: docker compose run --rm tests pytest tests/ui/ -m "not integration and not local_only" -v --tb=short
