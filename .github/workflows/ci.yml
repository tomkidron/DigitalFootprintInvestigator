name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      docker:
        image: docker:24.0.5-dind
        options: --privileged

    steps:
    - uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Build Docker image with caching
      uses: docker/build-push-action@v5
      with:
        context: .
        load: true
        tags: osint-tool:latest
        cache-from: type=gha
        cache-to: type=gha,mode=max

    - name: Run Unit Tests
      env:
        ANTHROPIC_API_KEY: "mock_anthropic_key"
        TAVILY_API_KEY: "mock_tavily_key"
        SERPAPI_KEY: "mock_serpapi_key"
      run: docker compose run --rm unit-tests

    - name: Run UI Tests (Streamlit + Playwright)
      env:
        ANTHROPIC_API_KEY: "mock_anthropic_key"
        TAVILY_API_KEY: "mock_tavily_key"
        SERPAPI_KEY: "mock_serpapi_key"
      run: docker compose run --rm tests
