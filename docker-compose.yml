services:
  osint-tool:
    build: .
    container_name: digital-footprint-investigator

    # Map Streamlit port
    ports:
      - "8501:8501"

    # Mount current directory for live code updates
    volumes:
      - .:/app
      - ./reports:/app/reports
      - ./logs:/app/logs
      # Anonymous volumes prevent host-side dirs from shadowing container state
      - /app/.venv
      - /app/venv
      - /app/__pycache__
      - /app/.pytest_cache

    # Pass-through environment variables from the host
    # (Local .env is automatically loaded by Compose if present)
    environment:
      - ANTHROPIC_API_KEY
      - TAVILY_API_KEY
      - SERPAPI_KEY
      - GITHUB_TOKEN
      - YOUTUBE_API_KEY
      - PYTHONPATH=.

    # Restart policy
    restart: unless-stopped
    shm_size: 2gb

  # Unit tests -- no running app required; execute with:
  #   docker compose run --rm unit-tests
  unit-tests:
    build: .
    container_name: osint-unit-tests
    volumes:
      - .:/app
      - /app/.venv
      - /app/venv
      - /app/__pycache__
      - /app/.pytest_cache
    environment:
      - PYTHONPATH=.
      - ANTHROPIC_API_KEY
      - TAVILY_API_KEY
      - SERPAPI_KEY
    command: [
      "sh", "-c",
      "ruff check . && ruff format --check . && pytest tests/unit/ -v --tb=short"
    ]

  # Isolated Streamlit instance used exclusively by UI tests.
  # Runs on port 8502 so it never shares state with the live osint-tool.
  app-test:
    build: .
    container_name: digital-footprint-investigator-test
    ports:
      - "8502:8502"
    volumes:
      - .:/app
      - /app/.venv
      - /app/venv
      - /app/__pycache__
      - /app/.pytest_cache
    environment:
      - ANTHROPIC_API_KEY
      - TAVILY_API_KEY
      - SERPAPI_KEY
      - GITHUB_TOKEN
      - YOUTUBE_API_KEY
      - PYTHONPATH=.
      - STREAMLIT_SERVER_PORT=8502
    command: ["streamlit", "run", "app.py", "--server.port=8502"]
    restart: "no"
    shm_size: 2gb
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8502/_stcore/health"]
      interval: 15s
      timeout: 10s
      start_period: 30s
      retries: 5

  # UI (Playwright) tests -- waits for the app-test to pass its health check; execute with:
  #   docker compose run --rm tests
  tests:
    build: .
    container_name: osint-ui-tests
    volumes:
      - .:/app
      - ./reports:/app/reports
      - ./logs:/app/logs
      # Anonymous volumes prevent host-side dirs from shadowing container state
      - /app/.venv
      - /app/venv
      - /app/__pycache__
      - /app/.pytest_cache
    environment:
      - PYTHONPATH=.
      - PLAYWRIGHT_BROWSERS_PATH=/ms-playwright
      - ANTHROPIC_API_KEY
      - TAVILY_API_KEY
      - SERPAPI_KEY
    command: ["pytest", "tests/ui/", "-m", "not integration", "-v", "--tb=short"]
    depends_on:
      app-test:
        condition: service_healthy
    shm_size: 2gb
