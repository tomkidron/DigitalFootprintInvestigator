services:
  osint-tool:
    build: .
    container_name: digital-footprint-investigator
    ports:
      - "8000:8000"
    volumes:
      - .:/app
      - ./reports:/app/reports
      - ./logs:/app/logs
      - /app/.venv
      - /app/venv
      - /app/__pycache__
      - /app/.pytest_cache
    environment:
      - GEMINI_API_KEY
      - TAVILY_API_KEY
      - SERPAPI_KEY
      - GITHUB_TOKEN
      - YOUTUBE_API_KEY
      - PYTHONPATH=.
    restart: unless-stopped
    shm_size: 2gb

  unit-tests:
    build: .
    container_name: osint-unit-tests
    volumes:
      - .:/app
      - /app/.venv
      - /app/venv
      - /app/__pycache__
      - /app/.pytest_cache
    environment:
      - PYTHONPATH=.
      - GEMINI_API_KEY
      - TAVILY_API_KEY
      - SERPAPI_KEY
    command: [
      "sh", "-c",
      "ruff check . && ruff format --check . && pytest tests/unit/ -v --tb=short"
    ]

  app-test:
    build: .
    container_name: digital-footprint-investigator-test
    ports:
      - "8001:8000"
    volumes:
      - .:/app
      - /app/.venv
      - /app/venv
      - /app/__pycache__
      - /app/.pytest_cache
    environment:
      - GEMINI_API_KEY
      - TAVILY_API_KEY
      - SERPAPI_KEY
      - GITHUB_TOKEN
      - YOUTUBE_API_KEY
      - PYTHONPATH=.
    command: ["uvicorn", "api.main:app", "--host", "0.0.0.0", "--port", "8000"]
    restart: "no"
    shm_size: 2gb
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8000/api/reports"]
      interval: 15s
      timeout: 10s
      start_period: 30s
      retries: 5

  tests:
    build: .
    container_name: osint-ui-tests
    volumes:
      - .:/app
      - ./reports:/app/reports
      - ./logs:/app/logs
      - /app/.venv
      - /app/venv
      - /app/__pycache__
      - /app/.pytest_cache
    environment:
      - PYTHONPATH=.
      - PLAYWRIGHT_BROWSERS_PATH=/ms-playwright
      - GEMINI_API_KEY
      - TAVILY_API_KEY
      - SERPAPI_KEY
    command: ["pytest", "tests/ui/", "-m", "not integration", "-v", "--tb=short"]
    depends_on:
      app-test:
        condition: service_healthy
    shm_size: 2gb
